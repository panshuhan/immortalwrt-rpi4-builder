name: Build Docker Image (Full)

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: 'ImmortalWrt Version'
        required: false
        default: '24.10.5'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/immortalwrt-rpi4-bypass

jobs:
  build-full:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker system prune -af
          echo "After cleanup:"
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone ImmortalWrt source
        run: |
          git clone --depth=1 --branch v${{ github.event.inputs.immortalwrt_version || '24.10.5' }} \
            https://github.com/immortalwrt/immortalwrt.git

      - name: Update feeds
        run: |
          cd immortalwrt
          # Add SSR Plus+ feed
          echo "src-git helloworld https://github.com/fw876/helloworld.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        run: |
          cd immortalwrt
          # Generate config for ARM64 generic (Docker)
          cat > .config <<EOF
          CONFIG_TARGET_armsr=y
          CONFIG_TARGET_armsr_armv8=y
          CONFIG_TARGET_armsr_armv8_DEVICE_generic=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_luci-i18n-ssr-plus-zh-cn=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y
          CONFIG_PACKAGE_luci-app-vsftpd=y
          CONFIG_PACKAGE_luci-i18n-vsftpd-zh-cn=y
          CONFIG_PACKAGE_luci-app-samba4=y
          CONFIG_PACKAGE_luci-i18n-samba4-zh-cn=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y
          EOF
          make defconfig

      - name: Download packages
        run: |
          cd immortalwrt
          make download -j8

      - name: Build firmware
        run: |
          cd immortalwrt
          make -j$(nproc) || make -j1 V=s

      - name: Extract rootfs
        run: |
          cd immortalwrt
          ROOTFS=$(find bin/targets/armsr/armv8/ -name "*rootfs.tar.gz" | head -1)
          if [ -z "$ROOTFS" ]; then
            echo "ERROR: rootfs.tar.gz not found"
            exit 1
          fi
          echo "Found rootfs: $ROOTFS"
          cp "$ROOTFS" ../rootfs.tar.gz

      - name: Create Dockerfile for full image
        run: |
          cat > Dockerfile.full <<'EOF'
          FROM scratch
          ADD rootfs.tar.gz /
          ENV TZ=Asia/Shanghai
          COPY docker/files/ /
          EXPOSE 80 443 22
          HEALTHCHECK --interval=30s --timeout=3s CMD wget -q --spider http://127.0.0.1 || exit 1
          CMD ["/sbin/init"]
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.full
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:full
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:full-${{ github.event.inputs.immortalwrt_version || '24.10.5' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create release summary
        run: |
          echo "### Docker Image Built Successfully (Full Version)! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:full\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Includes:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SSR Plus+" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Passwall" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ OpenClash" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All system utilities" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:full" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
